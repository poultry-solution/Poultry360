services:
  postgres:
    image: postgres:16-alpine
    container_name: poultry360-db
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: poultry360
      POSTGRES_PASSWORD: poultry360_prod
      POSTGRES_DB: poultry360
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U poultry360"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  backend:
    image: siddjuugi/poultry360-backend:latest
    container_name: poultry360-backend
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://poultry360:poultry360_prod@postgres:5432/poultry360
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  pgdata_prod:
